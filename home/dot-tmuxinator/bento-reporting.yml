# /Users/amiel/.tmuxinator/bento-reporting.yml

name: Bento Reporting
root: ~/src/bento/health-plan-reporting

on_project_start:

on_project_stop:
  - tmux kill-session -t "Test Bento Reporting"

on_project_restart:
  - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test Bento Reporting":2.1

windows:
  - ~:
  - ~:
  - editor: vi
  - ~:
    - tmux new-session -d -t "Bento Reporting" -s "Test Bento Reporting"
    - TMUX= tmux select-window -t "Test Bento Reporting":2
    - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test Bento Reporting":2.1
