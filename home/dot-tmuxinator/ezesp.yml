# /Users/amiel/.tmuxinator/ezesp.yml

name: ezesp
root: ~/src/ezesp

on_project_start:

on_project_stop:
  - tmux kill-session -t "Test ezesp"

on_project_restart:
  - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test ezesp":2.1

windows:
  - ~:
    - tmux new-session -d -t "ezesp" -s "Test ezesp"
    - TMUX= tmux select-window -t "Test ezesp":2
    - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test ezesp":2.1
  - tests:
  - max: cd max
  - follower: cd arduino/follower
  - leader: cd arduino/leader

