# /Users/amiel/.tmuxinator/activeadmin.yml

name: ActiveAdmin
root: ~/src/vendor/active_admin

on_project_start:

on_project_stop:
  - tmux kill-session -t "Test ActiveAdmin"

on_project_restart:
  - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test ActiveAdmin":2.1

windows:
  - server:
  - tests:
  - editor: vi
  - ~:
    - tmux new-session -d -t "ActiveAdmin" -s "Test ActiveAdmin"
    - TMUX= tmux select-window -t "Test ActiveAdmin":2
    - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test ActiveAdmin":2.1
