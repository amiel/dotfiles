# /Users/amiel/.tmuxinator/bento-dev-scripts.yml

name: dev-scripts
root: ~/src/bento/dev-scripts

on_project_start:

on_project_stop:
  - tmux kill-session -t "Test dev-scripts"

on_project_restart:
  - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test dev-scripts":2.1

windows:
  - ~:
  - tests:
  - editor: vi
  - ~:
    - tmux new-session -d -t "dev-scripts" -s "Test dev-scripts"
    - TMUX= tmux select-window -t "Test dev-scripts":2
    - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test dev-scripts":2.1
