name: Zurich
root: ~/src/bento/zurich

on_project_start:

on_project_stop:
  - tmux kill-session -t "Test Zurich"

on_project_restart:
  - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test Zurich":2.1

windows:
  - ~:
  - ~:
    - tmux new-session -d -t "Zurich" -s "Test Zurich"
    - TMUX= tmux select-window -t "Test Zurich":2
    - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test Zurich":2.1
