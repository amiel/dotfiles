# /Users/amiel/.tmuxinator/midi-hands.yml

name: Midi Hands
root: ~/src/mni/midi-hands

on_project_start:

on_project_stop:
  - tmux kill-session -t "Test Midi Hands"

on_project_restart:
  - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test Midi Hands":2.1

windows:
  - server:
      layout: tiled
      panes:
        - PORT=3022 bails s
        - tail -f log/development.log
  - tests:
  - editor: vi
  - ~:
    - tmux new-session -d -t "Midi Hands" -s "Test Midi Hands"
    - TMUX= tmux select-window -t "Test Midi Hands":2
    - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test Midi Hands":2.1

