name: Pomodoro
root: ~/

on_project_start:

on_project_stop:
  - tmux kill-session -t "Test Pomodoro"

on_project_restart:
  - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test Pomodoro":2.1

windows:
  - ~: pomo list
  - ~:
    - tmux new-session -d -t "Pomodoro" -s "Test Pomodoro"
    - TMUX= tmux select-window -t "Test Pomodoro":2
    - tmux list-clients | grep -q Test && tmux switch-client -c $(tmux list-clients | grep Test | sed 's/:.*//') -t "Test Pomodoro":2.1
  - ~:
    - read; cd ~/src/pomo-event; rm ~/.pomo/publish.sock; cargo run
